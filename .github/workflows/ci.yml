name: VoltChain CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contracts:
    name: Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run fmt
        run: cargo fmt --all --check
        working-directory: ./contracts
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: ./contracts
      - name: Run tests
        run: cargo test
        working-directory: ./contracts

  backend:
    name: Rust Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: voltchain
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run fmt
        run: cargo fmt --all --check
        working-directory: ./backend
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: ./backend
      - name: Run tests
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/voltchain
        run: cargo test
        working-directory: ./backend

  frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      - name: Run lint
        run: npm run lint
        working-directory: ./frontend
      - name: Build
        run: npm run build
        working-directory: ./frontend
